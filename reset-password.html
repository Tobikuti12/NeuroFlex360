<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Password – NeuroFlex360</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { padding-bottom: 48px; }
    .auth-header { background: var(--dark); padding: 40px 24px 28px; text-align: center; }
    .auth-logo { font-size: 36px; margin-bottom: 14px; }
    .auth-header h1 { font-size: 20px; font-weight: 600; color: white; margin-bottom: 4px; }
    .auth-header p  { font-size: 13px; color: rgba(255,255,255,0.45); }
    .auth-card { background: var(--surface); border-radius: var(--radius); margin: 20px 16px 0; padding: 24px 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
    .form-input { width: 100%; padding: 13px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; font-family: var(--font); color: var(--text); background: var(--bg); transition: border-color 0.2s; }
    .form-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(78,204,163,0.15); }
    .btn-main { width: 100%; padding: 14px; background: var(--accent); color: var(--dark); border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: var(--font); margin-top: 4px; transition: opacity 0.2s; }
    .btn-main:hover { opacity: 0.85; }
    .error-msg { font-size: 12px; color: var(--red); background: #fcebeb; border-radius: 8px; padding: 10px 12px; margin-bottom: 14px; display: none; }
    .error-msg.show { display: block; }
    .success-screen { display: none; padding: 60px 24px; text-align: center; }
    .success-screen.visible { display: block; }
    .success-emoji { font-size: 64px; margin-bottom: 16px; }
    .success-title { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
    .success-sub { font-size: 14px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }
  </style>
</head>
<body>

  <div id="form-view">
    <div class="auth-header">
      <div class="auth-logo">🔒</div>
      <h1>Create New Password</h1>
      <p>Choose something you will remember</p>
    </div>

    <div class="auth-card">
      <div class="error-msg" id="error-msg"></div>

      <div class="form-group">
        <label class="form-label" for="password">New Password</label>
        <input class="form-input" type="password" id="password" placeholder="Minimum 6 characters" />
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm">Confirm New Password</label>
        <input class="form-input" type="password" id="confirm" placeholder="Repeat your new password" />
      </div>

      <button class="btn-main" onclick="handleReset()">Save New Password</button>
    </div>
  </div>

  <div class="success-screen" id="success-view">
    <div class="success-emoji">✅</div>
    <h2 class="success-title">Password Updated!</h2>
    <p class="success-sub">Your password has been changed. You can now log in with your new password.</p>
    <button class="btn-primary" style="margin: 0 16px; width: calc(100% - 32px);" onclick="window.location.href='login.html'">
      Go to Login
    </button>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // Guard: must have a valid reset code session to reach this page
    var resetCode  = localStorage.getItem('nf360_reset_code');
    var resetEmail = localStorage.getItem('nf360_reset_email');
    var expiry     = parseInt(localStorage.getItem('nf360_reset_expiry') || '0');

    if (!resetCode || !resetEmail || Date.now() > expiry) {
      window.location.href = 'forgot-password.html';
    }

    function handleReset() {
      var pw      = document.getElementById('password').value;
      var confirm = document.getElementById('confirm').value;
      var errorEl = document.getElementById('error-msg');
      errorEl.classList.remove('show');

      if (pw.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters.';
        errorEl.classList.add('show');
        return;
      }

      if (pw !== confirm) {
        errorEl.textContent = 'Passwords do not match. Please try again.';
        errorEl.classList.add('show');
        return;
      }

      // Update the user's password in localStorage
      var users = getUsers();
      var idx   = users.findIndex(function(u) {
        return u.email.toLowerCase() === resetEmail.toLowerCase();
      });

      if (idx !== -1) {
        users[idx].password = pw;
        localStorage.setItem('nf360_users', JSON.stringify(users));
      }

      // Clear reset session
      localStorage.removeItem('nf360_reset_code');
      localStorage.removeItem('nf360_reset_email');
      localStorage.removeItem('nf360_reset_expiry');

      // Show success
      document.getElementById('form-view').style.display = 'none';
      document.getElementById('success-view').classList.add('visible');
    }
  </script>
</body>
</html>
