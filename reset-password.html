<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password – NeuroFlex360</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/desktop.css" />
</head>
<body class="auth-page">
<div class="auth-col">

  <div class="auth-header">
    <div class="auth-logo">📧</div>
    <h1>Check Your Email</h1>
    <p id="email-hint">We have sent a password reset link to your email.</p>
  </div>

  <div class="auth-card" style="text-align:center;">
    <div style="font-size:64px;margin-bottom:20px;">🔑</div>
    <p style="font-size:15px;color:rgba(255,255,255,0.8);line-height:1.7;margin-bottom:16px;">
      Click the link in the email to set a new password.<br>
      The link will expire after <strong>1 hour</strong>.
    </p>
    <p style="font-size:13px;color:rgba(255,255,255,0.4);line-height:1.6;margin-bottom:24px;">
      Check your <strong>spam or junk folder</strong> if you do not see it.
    </p>
    <button class="btn-main" onclick="window.location.href='login.html'">Back to Login</button>
    <div style="margin-top:14px;">
      <button onclick="window.location.href='forgot-password.html'" style="background:none;border:none;color:rgba(255,255,255,0.4);font-size:13px;cursor:pointer;font-family:Arial,sans-serif;">
        Send again with a different email
      </button>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    var params = new URLSearchParams(window.location.search);
    var email  = params.get('email') || '';
    if (email) {
      document.getElementById('email-hint').textContent =
        'We sent a password reset link to ' + email + '. Click the link to create a new password.';
    }
  </script>
</div><!-- end auth-col -->
</body>
</html>
