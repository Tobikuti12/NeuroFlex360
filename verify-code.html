<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enter Code – NeuroFlex360</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* Dark navy auth theme matching landing page */
    body {
      background: linear-gradient(135deg, #0f1729 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      padding-bottom: 48px;
      max-width: 600px;
    }
    .auth-header {
      background: transparent;
      padding: 48px 24px 28px;
      text-align: center;
    }
    .auth-logo {
      width: 60px; height: 60px;
      background: var(--accent); color: var(--dark);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 20px;
      margin: 0 auto 16px;
      box-shadow: 0 8px 24px rgba(78,204,163,0.3);
    }
    .auth-header h1 { font-size: 22px; font-weight: 700; color: white; margin-bottom: 4px; }
    .auth-header p  { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.6; }
    .auth-card {
      background: rgba(30,45,74,0.8);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      margin: 0 16px;
      padding: 24px 20px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.8); margin-bottom: 6px; }
    .form-input, .form-select {
      width: 100%; padding: 13px 14px;
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 12px; font-size: 14px;
      font-family: var(--font);
      color: white;
      background: rgba(255,255,255,0.07);
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(78,204,163,0.2);
    }
    .form-input.error, .form-select.error { border-color: var(--red); }
    .form-input::placeholder { color: rgba(255,255,255,0.3); }
    .form-select option { background: #1e2d4a; color: white; }
    .error-msg {
      font-size: 12px; color: #fca5a5;
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px; padding: 10px 12px;
      margin-bottom: 14px; display: none;
    }
    .error-msg.show { display: block; }
    .field-error { font-size: 11px; color: #fca5a5; margin-top: 4px; display: none; }
    .field-error.show { display: block; }
    .btn-main, .btn-signup {
      display: block; width: 100%; padding: 15px;
      background: var(--accent); color: var(--dark);
      border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: var(--font);
      transition: opacity 0.2s, transform 0.15s;
      min-height: 44px;
    }
    .btn-main:hover, .btn-signup:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-signup { width: calc(100% - 32px); margin: 16px 16px 0; }
    .btn-secondary {
      display: block; width: 100%; padding: 14px;
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px; font-size: 15px;
      cursor: pointer; font-family: var(--font);
      transition: background 0.2s; min-height: 44px;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.12); }
    .divider { text-align: center; font-size: 12px; color: rgba(255,255,255,0.3); margin: 16px 0; }
    .auth-footer { text-align: center; font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 16px; }
    .auth-footer a, .back-link a, .forgot-link { color: var(--accent); font-weight: 500; }
    .back-link { display: block; text-align: center; font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 12px; }
    .resend-link { display: block; text-align: center; font-size: 13px; color: var(--accent); font-weight: 500; margin-top: 16px; cursor: pointer; }
    .remember-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .remember-left { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .remember-left input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
    .remember-left label { font-size: 13px; color: rgba(255,255,255,0.7); cursor: pointer; }
    .remembered-banner {
      background: rgba(78,204,163,0.1);
      border: 1px solid rgba(78,204,163,0.3);
      border-radius: 10px; padding: 10px 14px;
      margin-bottom: 16px; font-size: 13px; color: var(--accent);
    }
    .remembered-banner button { float: right; background: none; border: none; font-size: 11px; color: rgba(255,255,255,0.4); cursor: pointer; font-family: var(--font); }
    .role-section { padding: 20px 16px 0; }
    .role-label { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 12px; }
    .role-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .role-card {
      background: rgba(30,45,74,0.6);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 18px 12px; text-align: center;
      cursor: pointer; transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }
    .role-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.2); }
    .role-card.selected { border-color: var(--accent); background: rgba(78,204,163,0.1); }
    .role-icon  { font-size: 28px; margin-bottom: 6px; }
    .role-title { font-size: 14px; font-weight: 600; color: white; margin-bottom: 3px; }
    .role-desc  { font-size: 11px; color: rgba(255,255,255,0.4); line-height: 1.4; }
    .section-divider { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.3); padding: 12px 0; border-top: 1px solid rgba(255,255,255,0.08); margin-top: 6px; }
    .select-wrap { position: relative; }
    .select-wrap::after { content: '▾'; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.4); pointer-events: none; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
    .code-input {
      width: 100%; padding: 18px; text-align: center;
      font-size: 32px; font-weight: 700; letter-spacing: 0.25em;
      font-family: var(--mono);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      background: rgba(255,255,255,0.07);
      color: white; margin-bottom: 6px;
      transition: border-color 0.2s;
      /* Remove number input arrows */
      -moz-appearance: textfield;
    }
    .code-input::-webkit-inner-spin-button,
    .code-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .code-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(78,204,163,0.2); }
    .form-hint { font-size: 12px; color: rgba(255,255,255,0.35); margin-bottom: 18px; line-height: 1.5; }
    .proto-notice { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); border-radius: 10px; padding: 12px 14px; margin-bottom: 16px; font-size: 12px; color: #fbbf24; line-height: 1.6; }
    .success-screen { display: none; padding: 60px 24px; text-align: center; }
    .success-screen.visible { display: block; }
    .success-emoji { font-size: 60px; margin-bottom: 14px; }
    .success-title { font-size: 22px; font-weight: 700; color: white; margin-bottom: 6px; }
    .success-sub   { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.6; margin-bottom: 28px; }
</style>
</head>
<body>

  <div class="auth-header">
    <div class="auth-logo">📧</div>
    <h1>Check Your Email</h1>
    <p id="email-hint">A 6-digit reset code has been sent to your email address. Check your inbox — it may take a minute or two. Also check your spam folder.</p>
  </div>

  <div class="auth-card">

    <!-- Prototype notice — remove this in production -->
    

    <div class="error-msg" id="error-msg"></div>

    <label class="form-label" for="code">Enter your 6-digit code</label>
    <input class="code-input" type="text" inputmode="numeric" id="code" placeholder="000000" maxlength="6" />
    <p class="form-hint">The code expires in 15 minutes. Check your spam folder if you don't see it.</p>

    <button class="btn-main" onclick="handleVerify()">Verify Code</button>
  </div>

  <span class="resend-link" onclick="resendCode()">Resend code</span>
  <p class="back-link"><a href="forgot-password.html">← Try a different email</a></p>

  <script src="js/auth.js"></script>
  <script>
    // Get email from URL
    var params = new URLSearchParams(window.location.search);
    var email  = params.get('email') || '';
    if (email) {
      document.getElementById('email-hint').textContent =
        'A 6-digit code has been sent to ' + email + '.';
    }

    document.getElementById('code').addEventListener('input', function() {
      // Only allow digits, max 6
      this.value = this.value.replace(/\D/g,'').slice(0,6);
    });

    function handleVerify() {
      var entered  = document.getElementById('code').value.trim();
      var stored   = localStorage.getItem('nf360_reset_code');
      var expiry   = parseInt(localStorage.getItem('nf360_reset_expiry') || '0');
      var errorEl  = document.getElementById('error-msg');
      errorEl.classList.remove('show');

      if (!entered || entered.length < 6) {
        errorEl.textContent = 'Please enter the full 6-digit code.';
        errorEl.classList.add('show');
        return;
      }

      if (Date.now() > expiry) {
        errorEl.textContent = 'This code has expired. Please request a new one.';
        errorEl.classList.add('show');
        return;
      }

      if (entered !== stored) {
        errorEl.textContent = 'That code is not correct. Please check and try again.';
        errorEl.classList.add('show');
        return;
      }

      // Code verified — go to reset password page
      window.location.href = 'reset-password.html';
    }

    function resendCode() {
      window.location.href = 'forgot-password.html';
    }

    document.getElementById('code').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleVerify();
    });
  </script>
</body>
</html>
