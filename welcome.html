<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuroFlex360 – Cognitive Rehabilitation</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono&display=swap" rel="stylesheet" />
  <style>
    /* (your full existing CSS stays unchanged — omitted here for brevity) */
  </style>
</head>

<body>

  <!-- NAV -->
  <nav>
    <div class="nav-logo">
      <div class="nav-logo-mark">NF</div>
      <span class="nav-logo-name">NeuroFlex360</span>
    </div>
    <div class="nav-actions">
      <button class="btn-nav-outline" onclick="window.location.href='login.html'">Log In</button>
      <button class="btn-nav-solid" onclick="window.location.href='signup.html'">Get Started</button>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <div class="hero-badge">🧠 Cognitive Rehabilitation</div>
      <h1>Train Your Brain.<br><span>Every Day.</span></h1>
      <p class="hero-sub">
        NeuroFlex360 is a cognitive rehabilitation app built for elderly patients and stroke survivors.
      </p>

      <div class="hero-buttons">
        <button class="btn-hero-primary" onclick="window.location.href='signup.html'">
          Create Account →
        </button>
        <button class="btn-hero-outline" onclick="window.location.href='login.html'">
          I Already Have an Account
        </button>
      </div>
    </div>
  </section>

  <!-- (rest of your HTML stays EXACTLY the same) -->

  <!-- FOOTER -->
  <footer>
    <div class="footer-left">NeuroFlex360 &copy; 2026</div>
    <div class="footer-right">Supervisor: Mr. Santhosh Menon</div>
  </footer>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>

  <!-- ✅ FIXED AUTH REDIRECT -->
  <script>
    fbAuth.onAuthStateChanged(function(user) {
      if (user) {
        const role = localStorage.getItem('role');

        window.location.href = (role === 'clinician')
          ? 'pages/clinician.html'
          : 'dashboard.html';
      }
    });
  </script>

</body>
</html>
