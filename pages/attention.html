<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attention – NeuroFlex360</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/attention.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/desktop.css" />
</head>
<body>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="page-header-top">
      <div>
        <h2>🎯 Attention Training</h2>
        <p>Focus and select carefully · <span id="difficulty-badge" style="font-weight:600;"></span></p>
      </div>
      <button class="back-btn" onclick="window.location.href='../index.html'">← Back</button>
    </div>
    <div class="stat-row">
      <div class="stat-box">
        <div class="stat-val" id="stat-score">0</div>
        <div class="stat-lbl">Score</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-question">1 / 10</div>
        <div class="stat-lbl">Question</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-streak">0</div>
        <div class="stat-lbl">Streak 🔥</div>
      </div>
    </div>
  </div>

  <!-- GAME AREA -->
  <div class="game-area" id="game-view">

    <!-- Question prompt box -->
    <div class="question-box">
      <p class="question-type" id="question-type">Which number is the largest?</p>
      <div class="number-display" id="number-display">--</div>
      <p class="question-hint" id="question-hint">Select the correct answer below</p>
    </div>

    <!-- Answer choices (4 buttons) -->
    <div class="choices-grid" id="choices-grid">
      <!-- Buttons injected by attention.js -->
    </div>

    <!-- Feedback message shown after each answer -->
    <div class="feedback-msg hidden" id="feedback-msg"></div>

  </div>

  <!-- RESULT SCREEN -->
  <div class="result-screen" id="result-view">
    <div class="result-emoji">🎯</div>
    <h2 class="result-title">Attention Complete!</h2>
    <p class="result-sub" id="result-sub">You answered all 10 questions</p>
    <div class="result-score-box">
      <div class="result-score-num" id="result-score">--</div>
      <div class="result-score-lbl">Attention Score</div>
    </div>
    <p id="level-change-msg" style="font-size:13px; font-weight:500; margin-bottom:16px; display:none;"></p>
    <button class="btn-primary" onclick="window.location.href='../index.html'">Back to Home</button>
    <button class="btn-secondary" onclick="window.location.href='progress.html'">View My Progress</button>
  </div>

    <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/congrats.js"></script>
  <script src="../js/attention.js"></script>
  <nav class="bottom-nav">
    <a href="../index.html" class="nav-item"><span class="nav-icon">🏠</span><span>Home</span></a>
    <a href="progress.html" class="nav-item"><span class="nav-icon">📊</span><span>Progress</span></a>
    <a href="profile.html" class="nav-item"><span class="nav-icon">👤</span><span>Profile</span></a>
    <a href="javascript:void(0)" onclick="logoutUser()" class="nav-item"><span class="nav-icon">🚪</span><span>Log Out</span></a>
  </nav>
</body>
</html>
