<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In – NeuroFlex360</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet" />
</head>

<body class="auth-page">

<div class="auth-col">
  <div class="auth-header">
    <div class="auth-logo">NF</div>
    <h1>Welcome Back</h1>
    <p>NeuroFlex360 — Cognitive Rehabilitation</p>
  </div>

  <div class="auth-card">

    <div class="error-msg" id="error-msg"></div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-input" type="email" id="email" placeholder="your@email.com" />
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="password" placeholder="Your password" />
    </div>

    <div class="remember-row">
      <div class="remember-left">
        <input type="checkbox" id="remember-me" />
        <label for="remember-me">Remember me</label>
      </div>
      <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
    </div>

    <button class="btn-main" onclick="handleLogin()">Log In</button>

    <div class="divider">— or —</div>

    <button class="btn-secondary" onclick="window.location.href='signup.html'">Create a New Account</button>
  </div>

  <p class="auth-footer">
    <a href='welcome.html'>← Back to home</a>
  </p>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>

<script>
  // ✅ FIXED: prevent redirect loop + correct routing
  fbAuth.onAuthStateChanged(function(user) {
    if (user && user.emailVerified) {
      const role = localStorage.getItem('role');

      window.location.href = (role === 'clinician')
        ? 'pages/clinician.html'
        : 'dashboard.html';
    }
  });

  function handleLogin() {
    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    var errorEl = document.getElementById('error-msg');
    var btn = document.querySelector('.btn-main');

    errorEl.classList.remove('show');

    if (!email || !password) {
      errorEl.textContent = 'Please enter your email and password.';
      errorEl.classList.add('show');
      return;
    }

    btn.textContent = 'Signing in…';
    btn.disabled = true;

    loginUser(email, password).then(function(result) {
      btn.textContent = 'Log In';
      btn.disabled = false;

      if (result !== true) {
        errorEl.textContent = result;
        errorEl.classList.add('show');
        return;
      }

      // store role safely
      const user = getCurrentUser();
      if (user && user.role) {
        localStorage.setItem('role', user.role);
      }

      const role = localStorage.getItem('role');

      window.location.href = (role === 'clinician')
        ? 'pages/clinician.html'
        : 'dashboard.html';
    });
  }

  document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleLogin();
  });
</script>

</body>
</html>
