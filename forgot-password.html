<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password – NeuroFlex360</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { padding-bottom: 48px; }
    .auth-header { background: var(--dark); padding: 40px 24px 28px; text-align: center; }
    .auth-logo { width: 52px; height: 52px; background: var(--accent); color: var(--dark); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; margin: 0 auto 14px; }
    .auth-header h1 { font-size: 20px; font-weight: 600; color: white; margin-bottom: 4px; }
    .auth-header p  { font-size: 13px; color: rgba(255,255,255,0.45); }
    .auth-card { background: var(--surface); border-radius: var(--radius); margin: 20px 16px 0; padding: 24px 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
    .form-label { display: block; font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
    .form-input { width: 100%; padding: 13px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; font-family: var(--font); color: var(--text); background: var(--bg); transition: border-color 0.2s; margin-bottom: 6px; }
    .form-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(78,204,163,0.15); }
    .form-hint { font-size: 12px; color: var(--muted); margin-bottom: 18px; line-height: 1.5; }
    .btn-main { width: 100%; padding: 14px; background: var(--accent); color: var(--dark); border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: opacity 0.2s; }
    .btn-main:hover { opacity: 0.85; }
    .error-msg { font-size: 12px; color: var(--red); background: #fcebeb; border-radius: 8px; padding: 10px 12px; margin-bottom: 14px; display: none; }
    .error-msg.show { display: block; }
    .back-link { display: block; text-align: center; font-size: 13px; color: var(--blue); font-weight: 500; margin-top: 16px; }
  </style>
</head>
<body>

  <div class="auth-header">
    <div class="auth-logo">🔑</div>
    <h1>Forgot Password?</h1>
    <p>Enter your email and we will send you a reset code</p>
  </div>

  <div class="auth-card">
    <div class="error-msg" id="error-msg"></div>

    <label class="form-label" for="email">Email Address</label>
    <input class="form-input" type="email" id="email" placeholder="your@email.com" />
    <p class="form-hint">We will send a 6-digit code to this address. Check your inbox — it may take a minute to arrive.</p>

    <button class="btn-main" onclick="handleSend()">Send Reset Code</button>
  </div>

  <a href="login.html" class="back-link">← Back to Login</a>

  <script src="js/auth.js"></script>
  <script>
    function handleSend() {
      var email   = document.getElementById('email').value.trim();
      var errorEl = document.getElementById('error-msg');
      errorEl.classList.remove('show');

      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errorEl.textContent = 'Please enter a valid email address.';
        errorEl.classList.add('show');
        return;
      }

      // Check if account exists
      var users = getUsers();
      var user  = users.find(function(u) { return u.email.toLowerCase() === email.toLowerCase(); });

      if (!user) {
        // We still show success for security — don't reveal whether email exists
        goToVerify(email);
        return;
      }

      // Generate a 6-digit code and store it temporarily
      // In a real app this would be emailed via a backend API
      var code = Math.floor(100000 + Math.random() * 900000).toString();
      localStorage.setItem('nf360_reset_code',  code);
      localStorage.setItem('nf360_reset_email', email.toLowerCase());
      localStorage.setItem('nf360_reset_expiry', Date.now() + 15 * 60 * 1000); // 15 min

      // PROTOTYPE NOTE: In production, the backend sends this code by email.
      // For demo purposes we show it in the console so it can be tested.
      console.log('[NeuroFlex360 Prototype] Reset code for ' + email + ': ' + code);

      goToVerify(email);
    }

    function goToVerify(email) {
      window.location.href = 'verify-code.html?email=' + encodeURIComponent(email);
    }
  </script>
</body>
</html>
