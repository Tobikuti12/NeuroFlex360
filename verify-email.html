<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email – NeuroFlex360</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="auth-header">
    <div class="auth-logo">📧</div>
    <h1 id="page-title">Check Your Email</h1>
    <p id="email-hint">We have sent a verification link to your email address.</p>
  </div>

  <div class="auth-card" style="text-align:center;">

    <div style="font-size:64px;margin-bottom:20px;">📬</div>

    <p style="font-size:15px;color:rgba(255,255,255,0.8);line-height:1.7;margin-bottom:16px;">
      Click the link in the email to verify your account.<br>
      Then come back here and tap the button below.
    </p>

    <p style="font-size:13px;color:rgba(255,255,255,0.4);line-height:1.6;margin-bottom:24px;">
      Check your <strong>spam or junk folder</strong> if you do not see it after a minute or two.
    </p>

    <button class="btn-main" id="verified-btn" onclick="checkVerified()">
      I have verified my email →
    </button>

    <div style="margin-top:16px;">
      <button onclick="resendEmail()" style="background:none;border:none;color:rgba(255,255,255,0.45);font-size:13px;cursor:pointer;font-family:Arial,sans-serif;">
        Resend verification email
      </button>
    </div>

    <div id="status-msg" style="margin-top:14px;font-size:13px;display:none;"></div>
  </div>

  <p style="text-align:center;font-size:13px;color:rgba(255,255,255,0.35);margin-top:16px;">
    <a href="signup.html" style="color:rgba(78,204,163,0.7);">← Back to Sign Up</a>
  </p>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    var params   = new URLSearchParams(window.location.search);
    var urlEmail = params.get('email') || '';
    var urlName  = params.get('name')  || 'there';

    if (urlName)  document.getElementById('page-title').textContent = 'Almost there, ' + urlName + '!';
    if (urlEmail) document.getElementById('email-hint').textContent =
      'We sent a verification link to ' + urlEmail + '. Click the link in that email, then tap the button below.';

    // Keep a reference to the Firebase user once auth is ready.
    // fbAuth.currentUser is null on page load — we must wait for this.
    var _fbUser = null;

    fbAuth.onAuthStateChanged(function(user) {
      _fbUser = user;
      // If user is already verified (e.g. they clicked the link in another tab),
      // redirect them automatically without needing to press the button.
      if (user && user.emailVerified) {
        window.location.href = 'onboarding.html';
      }
    });

    function checkVerified() {
      var btn    = document.getElementById('verified-btn');
      var status = document.getElementById('status-msg');

      btn.textContent = 'Checking…';
      btn.disabled    = true;
      status.style.display = 'none';

      // If Firebase hasn't resolved auth state yet, wait briefly and retry
      if (!_fbUser) {
        setTimeout(function() {
          btn.textContent = 'I have verified my email →';
          btn.disabled    = false;
          status.style.display  = 'block';
          status.style.color    = 'rgba(255,255,255,0.55)';
          status.textContent    = 'Please click the link in your email first, then tap this button again.';
        }, 1500);
        return;
      }

      // Force-reload the user token to get the latest emailVerified value from Firebase
      _fbUser.reload()
        .then(function() {
          // After reload, get the refreshed user object
          var freshUser = fbAuth.currentUser;
          if (freshUser && freshUser.emailVerified) {
            btn.textContent = '✅ Verified!';
            // Small pause so user sees the tick before navigating
            setTimeout(function() {
              window.location.href = 'onboarding.html';
            }, 600);
          } else {
            btn.textContent      = 'I have verified my email →';
            btn.disabled         = false;
            status.style.display = 'block';
            status.style.color   = '#fca5a5';
            status.textContent   = 'Not verified yet. Please click the link in your inbox, then try again.';
          }
        })
        .catch(function(err) {
          btn.textContent      = 'I have verified my email →';
          btn.disabled         = false;
          status.style.display = 'block';
          status.style.color   = '#fca5a5';
          status.textContent   = 'Something went wrong. Please try again.';
          console.error(err);
        });
    }

    function resendEmail() {
      var status = document.getElementById('status-msg');
      status.style.display = 'block';

      if (!_fbUser) {
        status.style.color   = 'rgba(255,255,255,0.5)';
        status.textContent   = 'Session expired. Please go back and sign up again.';
        return;
      }

      _fbUser.sendEmailVerification()
        .then(function() {
          status.style.color   = '#4ecca3';
          status.textContent   = '✅ Verification email resent. Check your inbox.';
        })
        .catch(function(err) {
          status.style.color   = '#fca5a5';
          status.textContent   = err.code === 'auth/too-many-requests'
            ? 'Too many attempts. Please wait a few minutes before resending.'
            : err.message;
        });
    }
  </script>
</body>
</html>
