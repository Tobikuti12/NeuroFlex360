<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email – NeuroFlex360</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="auth-header">
    <div class="auth-logo">📧</div>
    <h1 id="page-title">Check Your Email</h1>
    <p id="email-hint">We have sent a verification link to your email address.</p>
  </div>

  <div class="auth-card" style="text-align:center;">

    <div style="font-size:64px;margin-bottom:20px;">📬</div>

    <p style="font-size:15px;color:rgba(255,255,255,0.8);line-height:1.7;margin-bottom:16px;">
      Click the link in the email to verify your account.<br>
      Then come back here and tap the button below.
    </p>

    <p style="font-size:13px;color:rgba(255,255,255,0.4);line-height:1.6;margin-bottom:24px;">
      Check your <strong>spam or junk folder</strong> if you do not see it after a minute or two.
    </p>

    <button class="btn-main" id="verified-btn" onclick="checkVerified()">
      I have verified my email →
    </button>

    <div style="margin-top:16px;">
      <button onclick="resendEmail()" style="background:none;border:none;color:rgba(255,255,255,0.45);font-size:13px;cursor:pointer;font-family:Arial,sans-serif;">
        Resend verification email
      </button>
    </div>

    <div id="status-msg" style="margin-top:14px;font-size:13px;display:none;"></div>
  </div>

  <p style="text-align:center;font-size:13px;color:rgba(255,255,255,0.35);margin-top:16px;">
    <a href="signup.html" style="color:rgba(78,204,163,0.7);">← Back to Sign Up</a>
  </p>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    var params = new URLSearchParams(window.location.search);
    var email  = params.get('email') || '';
    var name   = params.get('name')  || 'there';

    if (name)  document.getElementById('page-title').textContent  = 'Almost there, ' + name + '!';
    if (email) document.getElementById('email-hint').textContent  =
      'We sent a verification link to ' + email + '. Click the link in that email, then tap the button below.';

    function checkVerified() {
      var btn    = document.getElementById('verified-btn');
      var status = document.getElementById('status-msg');
      btn.textContent = 'Checking…';
      btn.disabled    = true;

      var user = fbAuth.currentUser;

      if (!user) {
        // Try signing in silently to reload state
        status.style.display = 'block';
        status.style.color   = 'rgba(255,255,255,0.5)';
        status.textContent   = 'Please click the link in your email first, then tap this button.';
        btn.textContent = 'I have verified my email →';
        btn.disabled    = false;
        return;
      }

      // Reload the user to get fresh emailVerified status
      user.reload().then(function() {
        if (user.emailVerified) {
          btn.textContent = '✅ Verified!';
          window.location.href = 'index.html';
        } else {
          btn.textContent = 'I have verified my email →';
          btn.disabled    = false;
          status.style.display = 'block';
          status.style.color   = '#fca5a5';
          status.textContent   = 'Email not verified yet. Please click the link in your inbox first.';
        }
      }).catch(function(err) {
        btn.textContent = 'I have verified my email →';
        btn.disabled    = false;
        status.style.display = 'block';
        status.style.color   = '#fca5a5';
        status.textContent   = 'Error checking verification status. Please try again.';
      });
    }

    function resendEmail() {
      var user   = fbAuth.currentUser;
      var status = document.getElementById('status-msg');
      status.style.display = 'block';

      if (!user) {
        status.style.color   = 'rgba(255,255,255,0.5)';
        status.textContent   = 'Please sign up first.';
        return;
      }

      user.sendEmailVerification().then(function() {
        status.style.color   = '#4ecca3';
        status.textContent   = '✅ Verification email resent. Check your inbox.';
      }).catch(function(err) {
        status.style.color   = '#fca5a5';
        status.textContent   = err.message;
      });
    }
  </script>
</body>
</html>
